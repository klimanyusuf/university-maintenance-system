name: Keep Supabase Alive

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          echo "🔄 Pinging keep-alive endpoint..."
          curl -X GET "https://klimanyusuf-maintenance-backend.hf.space/api/keep-alive/"
          echo ""
          echo "✅ Ping completed"
